name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  portable-core:
    name: Portable core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  windows-x64:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Configure
        run: cmake -S . -B build -A x64
      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel 2>&1 | Tee-Object -FilePath windows-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Upload compiler log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-compiler-log
          path: windows-build.log
          if-no-files-found: error
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package | Out-Null
          Copy-Item build/Release/ClearTune.exe package/
          Copy-Item README.md, LICENSE package/
          Compress-Archive -Path package/* -DestinationPath ClearTune-windows-x64.zip
      - uses: actions/upload-artifact@v7
        with:
          name: ClearTune-windows-x64
          path: ClearTune-windows-x64.zip
          if-no-files-found: error
