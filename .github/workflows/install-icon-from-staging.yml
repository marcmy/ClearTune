name: Republish ClearTune 0.1.0 with fixed icon

on:
  push:
    branches:
      - main
    paths:
      - .github/release-v0.1.0-fixed-icon-trigger

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out verified icon commit
        uses: actions/checkout@v7
        with:
          ref: ebbf67d5e5b3180e554f21549875c90e31953a2e
          fetch-depth: 0

      - name: Verify release source icon
        shell: pwsh
        run: |
          $expectedHash = '605daf15aa75dfc5b2c69728d56ce06bc6356a24040891a44f572c147cd65dfa'
          $actualHash = (Get-FileHash src/win32/ClearTune.ico -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            throw "Source icon SHA-256 mismatch: expected $expectedHash, got $actualHash."
          }

          $bytes = [IO.File]::ReadAllBytes('src/win32/ClearTune.ico')
          $count = [BitConverter]::ToUInt16($bytes, 4)
          if ($count -ne 3) { throw "Expected 3 ICO frames, found $count." }

          $sizes = for ($i = 0; $i -lt $count; $i++) {
            $width = [int]$bytes[6 + (16 * $i)]
            if ($width -eq 0) { 256 } else { $width }
          }
          if (($sizes -join ',') -ne '16,32,256') {
            throw "Unexpected ICO frame sizes: $($sizes -join ',')."
          }

      - name: Configure
        run: cmake -S . -B build -A x64

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package | Out-Null
          Copy-Item build/Release/ClearTune.exe package/
          Copy-Item README.md, LICENSE package/
          Compress-Archive -Path package/* -DestinationPath ClearTune-windows-x64.zip

          $zipHash = (Get-FileHash ClearTune-windows-x64.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          "$zipHash  ClearTune-windows-x64.zip" | Set-Content -NoNewline SHA256SUMS.txt
          "ZIP_SHA256=$zipHash" | Out-File -FilePath $env:GITHUB_ENV -Append

          @'
          # ClearTune 0.1.0

          The first public release of ClearTune: a native C++/Win32 ClearType calibration wizard with genuine System, Light, and Dark sample polarity.

          ## Highlights

          - Stock-compatible ClearType sample stages and live preview behavior
          - System, Light, and Dark calibration themes
          - One-click opposite-polarity comparison without changing the selection
          - Interactive monitor map using the real Windows display arrangement
          - EDID/DisplayConfig monitor model names when available
          - Per-monitor Light/Dark review when tuning multiple displays
          - Exact final preview of the settings that Finish will save
          - Transactional Back and Cancel behavior with launch-state rollback
          - Sharp transparent Windows application icon with native small frames and a 256×256 Explorer frame
          - No administrator rights, service, updater, telemetry, or third-party runtime

          Download `ClearTune-windows-x64.zip`, extract it, and run `ClearTune.exe`.
          '@ | Set-Content RELEASE_NOTES.md

      - name: Remove previous release and tag if present
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          gh release delete v0.1.0 --repo $env:GITHUB_REPOSITORY --yes --cleanup-tag *> $null
          gh api --method DELETE "repos/$env:GITHUB_REPOSITORY/git/refs/tags/v0.1.0" *> $null
          exit 0

      - name: Publish v0.1.0
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create v0.1.0 `
            ClearTune-windows-x64.zip `
            SHA256SUMS.txt `
            --repo $env:GITHUB_REPOSITORY `
            --target ebbf67d5e5b3180e554f21549875c90e31953a2e `
            --title 'ClearTune 0.1.0' `
            --notes-file RELEASE_NOTES.md

      - name: Download and verify published asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Path published | Out-Null
          gh release download v0.1.0 `
            --repo $env:GITHUB_REPOSITORY `
            --pattern ClearTune-windows-x64.zip `
            --dir published

          $publishedHash = (Get-FileHash published/ClearTune-windows-x64.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($publishedHash -ne $env:ZIP_SHA256) {
            throw "Published ZIP mismatch: expected $env:ZIP_SHA256, got $publishedHash."
          }

      - name: Record verified republish
        shell: pwsh
        run: |
          git switch main
          git pull --ff-only origin main

          $status = [ordered]@{
            result = 'success'
            source_commit = 'ebbf67d5e5b3180e554f21549875c90e31953a2e'
            icon_sha256 = '605daf15aa75dfc5b2c69728d56ce06bc6356a24040891a44f572c147cd65dfa'
            ico_frames = @(16, 32, 256)
            zip_sha256 = $env:ZIP_SHA256
            run_id = $env:GITHUB_RUN_ID
          } | ConvertTo-Json
          $status | Set-Content .github/release-v0.1.0-fixed-icon-status.json

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/release-v0.1.0-fixed-icon-status.json
          git commit -m 'chore: record fixed-icon v0.1.0 republish'
          git push origin main
