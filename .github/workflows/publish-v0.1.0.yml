name: Publish ClearTune 0.1.0 release

on:
  workflow_run:
    workflows:
      - Build ClearTune 0.1.0 release
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  publish:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out main for release receipt
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Download verified build artifact
        uses: actions/download-artifact@v7
        with:
          name: ClearTune-v0.1.0-windows-x64
          path: release
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Verify package and prepare notes
        shell: pwsh
        run: |
          $zipPath = 'release/ClearTune-windows-x64.zip'
          $sumPath = 'release/SHA256SUMS.txt'
          if (-not (Test-Path $zipPath)) { throw 'Release ZIP is missing from the workflow artifact.' }
          if (-not (Test-Path $sumPath)) { throw 'SHA256SUMS.txt is missing from the workflow artifact.' }

          $expected = ((Get-Content $sumPath -Raw) -split '\s+')[0].Trim().ToLowerInvariant()
          $actual = (Get-FileHash $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) {
            throw "Artifact checksum mismatch: expected $expected, got $actual."
          }
          "ZIP_SHA256=$actual" | Out-File -FilePath $env:GITHUB_ENV -Append

          New-Item -ItemType Directory -Path inspected | Out-Null
          Expand-Archive -Path $zipPath -DestinationPath inspected
          $expectedFiles = @('ClearTune.exe', 'README.md', 'LICENSE')
          $actualFiles = @(Get-ChildItem inspected -File | ForEach-Object Name | Sort-Object)
          if (($actualFiles -join ',') -ne (($expectedFiles | Sort-Object) -join ',')) {
            throw "Unexpected ZIP contents: $($actualFiles -join ', ')."
          }

          @'
          # ClearTune 0.1.0

          The first public release of ClearTune: a native C++/Win32 ClearType calibration wizard with genuine System, Light, and Dark sample polarity.

          ## Highlights

          - Stock-compatible ClearType sample stages and live preview behavior
          - System, Light, and Dark calibration themes
          - One-click opposite-polarity comparison without changing the selection
          - Interactive monitor map using the real Windows display arrangement
          - EDID/DisplayConfig monitor model names when available
          - Per-monitor Light/Dark review when tuning multiple displays
          - Exact final preview of the settings that Finish will save
          - Transactional Back and Cancel behavior with launch-state rollback
          - Sharp transparent Windows application icon with native small frames and a 256×256 Explorer frame
          - No administrator rights, service, updater, telemetry, or third-party runtime

          Download `ClearTune-windows-x64.zip`, extract it, and run `ClearTune.exe`.
          '@ | Set-Content RELEASE_NOTES.md

      - name: Remove previous release and tag if present
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          gh release delete v0.1.0 --repo $env:GITHUB_REPOSITORY --yes --cleanup-tag *> $null
          git push origin :refs/tags/v0.1.0 *> $null
          exit 0

      - name: Create v0.1.0 tag
        shell: pwsh
        run: |
          git tag -f v0.1.0 ebbf67d5e5b3180e554f21549875c90e31953a2e
          git push origin refs/tags/v0.1.0

      - name: Publish v0.1.0 from existing tag
        shell: pwsh
        run: |
          gh release create v0.1.0 `
            release/ClearTune-windows-x64.zip `
            release/SHA256SUMS.txt `
            --repo $env:GITHUB_REPOSITORY `
            --verify-tag `
            --title 'ClearTune 0.1.0' `
            --notes-file RELEASE_NOTES.md

      - name: Download and verify published asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path published | Out-Null
          gh release download v0.1.0 `
            --repo $env:GITHUB_REPOSITORY `
            --pattern ClearTune-windows-x64.zip `
            --dir published

          $publishedHash = (Get-FileHash published/ClearTune-windows-x64.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($publishedHash -ne $env:ZIP_SHA256) {
            throw "Published ZIP mismatch: expected $env:ZIP_SHA256, got $publishedHash."
          }

      - name: Record verified release
        shell: pwsh
        run: |
          git pull --ff-only origin main

          $status = [ordered]@{
            result = 'success'
            source_commit = 'ebbf67d5e5b3180e554f21549875c90e31953a2e'
            icon_sha256 = '605daf15aa75dfc5b2c69728d56ce06bc6356a24040891a44f572c147cd65dfa'
            ico_frames = @(16, 32, 256)
            zip_sha256 = $env:ZIP_SHA256
            build_run_id = '${{ github.event.workflow_run.id }}'
            publish_run_id = $env:GITHUB_RUN_ID
          } | ConvertTo-Json
          $status | Set-Content .github/release-v0.1.0-fixed-icon-status.json

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/release-v0.1.0-fixed-icon-status.json
          git commit -m 'chore: record verified v0.1.0 release'
          git push origin main
